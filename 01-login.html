<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Login — Autism Copilot</title>
<script src="https://cdn.tailwindcss.com?plugins=forms"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Lexend',sans-serif;background:#0d1e18;color:#f0faf6;min-height:100dvh;}
:root{--primary:#13ecb6;--bg:#0d1e18;--surface:#132b22;--surface-2:#1a3a2e;--border:#1f4a3a;--text-1:#f0faf6;--text-2:#9bbfb2;--text-3:#5a8a7a;--danger:#f87171;--radius:.875rem;}
.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;vertical-align:middle;line-height:1;}
.fill-icon{font-variation-settings:'FILL' 1,'wght' 400,'GRAD' 0,'opsz' 24;}
.app{max-width:430px;margin:0 auto;min-height:100dvh;background:var(--bg);border-left:1px solid var(--border);border-right:1px solid var(--border);display:flex;flex-direction:column;}
.mesh-bg{background:radial-gradient(ellipse at 15% 15%,rgba(19,236,182,.08) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(19,236,182,.05) 0%,transparent 55%),#0d1e18;}
.input{width:100%;height:3.25rem;background:var(--surface-2);border:1.5px solid var(--border);border-radius:var(--radius);color:var(--text-1);font-family:'Lexend',sans-serif;padding:0 1rem;font-size:.9rem;outline:none;transition:border-color .2s,box-shadow .2s;}
.input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(19,236,182,.1);}
.input::placeholder{color:var(--text-3);}
.btn{display:flex;align-items:center;justify-content:center;gap:.5rem;border:none;border-radius:var(--radius);cursor:pointer;font-family:'Lexend',sans-serif;font-weight:700;font-size:.9rem;transition:opacity .15s,transform .15s;}
.btn:active{transform:scale(.97);opacity:.9;}
.btn-primary{background:var(--primary);color:#0d1e18;box-shadow:0 4px 18px rgba(19,236,182,.28);}
.btn-full{width:100%;height:3.25rem;}
.btn-lg{height:3.5rem;font-size:1rem;}
@keyframes slide-up{from{transform:translateY(18px);opacity:0;}to{transform:translateY(0);opacity:1;}}
.anim-up{animation:slide-up .4s ease both;}
.d1{animation-delay:.08s;}.d2{animation-delay:.16s;}.d3{animation-delay:.24s;}.d4{animation-delay:.32s;}.d5{animation-delay:.4s;}
</style>
</head>
<body class="mesh-bg">
<div class="app">

  <!-- Top bar -->
  <div style="display:flex;align-items:center;padding:.875rem 1rem;gap:.5rem;">
    <button onclick="history.back()" style="width:36px;height:36px;border-radius:50%;background:rgba(19,236,182,.08);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--primary);">
      <span class="material-symbols-outlined" style="font-size:20px;">arrow_back</span>
    </button>
    <h2 style="flex:1;text-align:center;font-size:1rem;font-weight:700;color:var(--text-1);">Login</h2>
    <div style="width:36px;"></div>
  </div>

  <!-- Hero glow orb -->
  <div class="anim-up" style="display:flex;flex-direction:column;align-items:center;padding:2rem 1.5rem 1.5rem;">
    <div style="width:80px;height:80px;border-radius:22px;background:rgba(19,236,182,.12);border:1px solid rgba(19,236,182,.25);display:flex;align-items:center;justify-content:center;box-shadow:0 0 40px rgba(19,236,182,.15);margin-bottom:1.5rem;">
      <span class="material-symbols-outlined fill-icon" style="font-size:40px;color:var(--primary);">diversity_4</span>
    </div>
    <h1 style="font-size:1.75rem;font-weight:800;color:var(--text-1);text-align:center;line-height:1.15;">Welcome back</h1>
    <p style="font-size:.875rem;color:var(--text-2);text-align:center;margin-top:.5rem;max-width:260px;line-height:1.6;">Your child's support companion is ready when you are.</p>
  </div>

  <!-- Form -->
  <div class="anim-up d2" style="flex:1;padding:0 1.25rem 2rem;display:flex;flex-direction:column;gap:1.25rem;">

    <!-- Social buttons -->
    <div style="display:flex;flex-direction:column;gap:.75rem;">
      <button class="btn btn-full" style="background:var(--surface);border:1.5px solid var(--border);color:var(--text-1);gap:.75rem;">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Continue with Google
      </button>
      <button class="btn btn-full" style="background:var(--surface);border:1.5px solid var(--border);color:var(--text-1);gap:.75rem;">
        <span class="material-symbols-outlined fill-icon" style="font-size:20px;">ios</span>
        Continue with Apple
      </button>
    </div>

    <!-- Divider -->
    <div style="display:flex;align-items:center;gap:1rem;">
      <div style="flex:1;height:1px;background:var(--border);"></div>
      <span style="font-size:.75rem;color:var(--text-3);font-weight:600;text-transform:uppercase;letter-spacing:.08em;">or</span>
      <div style="flex:1;height:1px;background:var(--border);"></div>
    </div>

    <!-- Fields -->
    <div style="display:flex;flex-direction:column;gap:1rem;">
      <div>
        <label style="display:block;font-size:.8rem;font-weight:600;color:var(--text-2);margin-bottom:.5rem;padding-left:.25rem;">Email Address</label>
        <input class="input" type="email" placeholder="parent@example.com"/>
      </div>
      <div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;padding:0 .25rem;">
          <label style="font-size:.8rem;font-weight:600;color:var(--text-2);">Password</label>
          <a href="#" style="font-size:.75rem;color:var(--primary);font-weight:600;text-decoration:none;">Forgot password?</a>
        </div>
        <div style="position:relative;">
          <input class="input" type="password" placeholder="Enter your password" style="padding-right:3rem;"/>
          <button style="position:absolute;right:.875rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text-3);">
            <span class="material-symbols-outlined" style="font-size:20px;">visibility</span>
          </button>
        </div>
      </div>
    </div>

    <button class="btn btn-primary btn-full btn-lg" style="margin-top:.5rem;">
      Login to Copilot
      <span class="material-symbols-outlined" style="font-size:18px;">arrow_forward</span>
    </button>

    <p style="text-align:center;font-size:.825rem;color:var(--text-3);margin-top:auto;padding-top:.5rem;">
      New to Autism Copilot? 
      <a href="02-create-account.html" style="color:var(--primary);font-weight:700;text-decoration:none;">Create an account</a>
    </p>
  </div>

</div>
</body>
</html>
